<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoseIt — ניהול משקל</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- מסך סיסמה -->
<div id="passwordScreen" style="
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  position:fixed; inset:0; z-index:9999;
  background: linear-gradient(135deg, #f0f2f8 0%, #e8eaf6 50%, #fce4ec 100%);">
  <div style="
    background:rgba(255,255,255,.92); backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.8);
    border-radius:24px; padding:44px 36px;
    box-shadow:0 8px 32px rgba(99,102,241,.15), 0 32px 64px rgba(0,0,0,.1);
    text-align:center; width:320px;">
    <div style="font-size:3rem; margin-bottom:8px; line-height:1;">⚖️</div>
    <h2 style="margin:0 0 4px; font-size:1.6rem; font-weight:800; color:#0f172a; letter-spacing:-.03em;">LoseIt</h2>
    <p style="margin:0 0 28px; color:#64748b; font-size:.88rem;">הכנס סיסמה להמשך</p>
    <input id="passwordInput" type="password" placeholder="••••••" autofocus
      style="width:100%; padding:13px 16px; border:2px solid #e4e8f0; border-radius:12px;
             font-size:1.3rem; text-align:center; outline:none; box-sizing:border-box;
             transition:border-color .2s, box-shadow .2s; letter-spacing:.2em;
             font-family:inherit; background:#f8fafc; color:#0f172a;" />
    <p id="passwordError" style="color:#f43f5e; font-size:.83rem; margin:8px 0 0; min-height:1.2em; font-weight:500;"></p>
    <button id="passwordBtn" style="
      margin-top:14px; width:100%; padding:13px;
      background:linear-gradient(135deg,#6366f1,#4f46e5);
      color:#fff; border:none; border-radius:12px;
      font-size:1rem; cursor:pointer; font-weight:700;
      box-shadow:0 4px 16px rgba(99,102,241,.4);
      transition:all .2s; letter-spacing:.01em;">
      כניסה לאתר
    </button>
  </div>
</div>

<script>
(function() {
  var PASS = '260487';
  var KEY  = 'loseit_auth';
  var screen = document.getElementById('passwordScreen');

  // אם כבר מאומת בסשן — הסתר מיד
  if (sessionStorage.getItem(KEY) === '1') {
    screen.style.display = 'none';
    return;
  }

  function tryLogin() {
    var val = document.getElementById('passwordInput').value;
    if (val === PASS) {
      sessionStorage.setItem(KEY, '1');
      screen.style.display = 'none';
    } else {
      document.getElementById('passwordError').textContent = 'סיסמה שגויה, נסה שוב';
      document.getElementById('passwordInput').value = '';
      document.getElementById('passwordInput').focus();
    }
  }

  document.getElementById('passwordBtn').addEventListener('click', tryLogin);
  document.getElementById('passwordInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') tryLogin();
    document.getElementById('passwordError').textContent = '';
  });
})();
</script>

<header>
  <div class="header-inner">
    <div class="logo">⚖️ <span>LoseIt</span></div>
    <nav class="desktop-nav">
      <button class="nav-btn active" data-view="dashboard"><span class="nav-icon">🏠</span><span class="nav-label"> דשבורד</span></button>
      <button class="nav-btn" data-view="calendar"><span class="nav-icon">📅</span><span class="nav-label"> לוח שנה</span></button>
      <button class="nav-btn" data-view="history"><span class="nav-icon">📋</span><span class="nav-label"> היסטוריה</span></button>
    </nav>
  </div>
</header>

<!-- Mobile bottom navigation -->
<nav class="mobile-nav">
  <button class="mob-nav-btn active" data-view="dashboard">
    <span class="mob-icon">🏠</span>
    <span class="mob-label">דשבורד</span>
  </button>
  <button class="mob-nav-btn" data-view="calendar">
    <span class="mob-icon">📅</span>
    <span class="mob-label">לוח שנה</span>
  </button>
  <button class="mob-nav-btn" data-view="history">
    <span class="mob-icon">📋</span>
    <span class="mob-label">היסטוריה</span>
  </button>
</nav>

<main>

  <!-- ═══ DASHBOARD ═══ -->
  <div id="view-dashboard" class="view active">

    <!-- User switcher -->
    <div id="userSwitcher" class="user-switcher"></div>

    <!-- Stats -->
    <section id="stats-section">
      <div id="stats-cards"></div>
    </section>

    <!-- Chart -->
    <section class="card chart-card">
      <div class="card-header">
        <h2>📈 גרף משקל</h2>
        <div class="period-btns">
          <button class="btn-period active" data-days="0">החודש</button>
          <button class="btn-period" data-days="90">3 חודשים</button>
          <button class="btn-period" data-days="365">שנה</button>
        </div>
      </div>
      <div class="chart-wrapper">
        <canvas id="weightChart"></canvas>
        <div id="workoutRow" class="workout-row"></div>
      </div>
    </section>

    <!-- Manual entry -->
    <section class="card">
      <div class="card-header"><h2>✏️ הוספה ידנית</h2></div>
      <form id="manualForm" class="manual-form">
        <select id="entryUser" required></select>
        <input type="number" id="entryWeight" placeholder='משקל (ק"ג)' step="0.1" min="30" max="300" required />
        <input type="text" id="entryNote" placeholder="הערה (אופציונלי)" />
        <button type="submit" class="btn-primary">הוסף</button>
      </form>
    </section>

  </div>

  <!-- ═══ CALENDAR ═══ -->
  <div id="view-calendar" class="view">
    <div class="calendar-toolbar">
      <div id="calUserSwitcher" class="user-switcher small"></div>
      <div class="cal-nav">
        <button id="calPrev">‹</button>
        <span id="calTitle"></span>
        <button id="calNext">›</button>
      </div>
    </div>
    <div id="summaryCards" class="summary-cards"></div>
    <div class="card"><div id="calGrid" class="cal-grid"></div></div>
    <div id="dayDetail" class="day-detail hidden">
      <div class="day-detail-header">
        <button onclick="navigateDay(-1)" id="btnPrevDay">‹</button>
        <h3 id="dayDetailTitle"></h3>
        <button onclick="navigateDay(1)" id="btnNextDay">›</button>
        <button onclick="closeDayDetail()" class="btn-close">✕</button>
      </div>
      <div id="dayDetailBody"></div>
    </div>
  </div>

  <!-- ═══ HISTORY ═══ -->
  <div id="view-history" class="view">
    <div class="card">
      <div class="card-header">
        <h2>📋 היסטוריית נתונים</h2>
        <div id="filterUserBtns" class="filter-user-btns"></div>
      </div>
      <div id="historyTable"></div>
    </div>
  </div>

</main>

<!-- ═══ FOOD EDIT MODAL ═══ -->
<div id="foodModal" class="modal-overlay hidden">
  <div class="modal modal-wide">
    <div class="modal-header">
      <h3>✏️ עריכת ארוחה</h3>
      <button onclick="closeFoodModal()" class="btn-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="food-items-header">
        <span>פריט</span>
        <span>קלוריות</span>
        <span></span>
      </div>
      <div id="foodItemsList"></div>
      <button onclick="addFoodItem()" class="btn-add-item">+ הוסף פריט</button>
      <div class="food-total-row">
        סה"כ: <strong id="foodTotalCalc">0</strong> קלוריות
      </div>
    </div>
    <div class="modal-footer">
      <button onclick="closeFoodModal()" class="btn-secondary">ביטול</button>
      <button onclick="saveFoodEdit()" class="btn-primary">שמור</button>
    </div>
  </div>
</div>

<!-- ═══ ADD FOOD MODAL ═══ -->
<div id="addFoodModal" class="modal-overlay hidden">
  <div class="modal modal-wide">
    <div class="modal-header">
      <h3>🍽️ הוספת ארוחה — <span id="addFoodDateTitle"></span></h3>
      <button onclick="closeAddFoodModal()" class="btn-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="food-items-header">
        <span>פריט</span>
        <span>קלוריות</span>
        <span></span>
      </div>
      <div id="addFoodItemsList"></div>
      <button onclick="addFoodItem()" class="btn-add-item">+ הוסף פריט</button>
      <div class="food-total-row">
        סה"כ: <strong id="addFoodTotalCalc">0</strong> קלוריות
      </div>
    </div>
    <div class="modal-footer">
      <button onclick="closeAddFoodModal()" class="btn-secondary">ביטול</button>
      <button onclick="saveAddFood()" class="btn-primary">הוסף</button>
    </div>
  </div>
</div>

<!-- ═══ WEIGHT EDIT MODAL ═══ -->
<div id="weightModal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h3>✏️ עריכת משקל</h3>
      <button onclick="closeWeightModal()" class="btn-close">✕</button>
    </div>
    <div class="modal-body">
      <label>משקל (ק"ג)</label>
      <input type="number" id="weightEditVal" step="0.1" min="30" max="300" />
      <label>הערה</label>
      <input type="text" id="weightEditNote" placeholder="הערה (אופציונלי)" />
    </div>
    <div class="modal-footer">
      <button onclick="closeWeightModal()" class="btn-secondary">ביטול</button>
      <button onclick="saveWeightEdit()" class="btn-primary">שמור</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="app.js"></script>
</body>
</html>
